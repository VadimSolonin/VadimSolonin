  <text x="201" y="244" font-size="9" font-weight="700" fill="#116329" text-anchor="middle">Playwright</text>
  <rect x="238" y="232" width="78" height="18" rx="3" fill="#ddf4ff"/>
  <text x="277" y="244" font-size="9" font-weight="700" fill="#0550ae" text-anchor="middle">Rest-Assured</text>
  <rect x="322" y="232" width="40" height="18" rx="3" fill="#ddf4ff"/>
  <text x="342" y="244" font-size="9" font-weight="700" fill="#0550ae" text-anchor="middle">JUnit</text>

