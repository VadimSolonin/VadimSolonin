  <rect width="800" height="390" rx="12" fill="#f6f8fa"/>
  <rect width="800" height="390" rx="12" fill="none" stroke="#d0d7de" stroke-width="1"/>

  <!-- Window dots -->
  <circle cx="28" cy="26" r="6" fill="#ff5f57"/>
  <circle cx="48" cy="26" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="26" r="6" fill="#28ca41"/>

  <!-- Role only -->
  <text x="28" y="58" font-size="12" fill="#57606a">Pizza-powered QA Engineer @ Dodo Brands</text>

