        55%    { opacity: 0; }
        56%    { opacity: 1; }
        57%    { opacity: 0; }
        58%    { opacity: 1; }
        59%    { opacity: 0; }
        60%    { opacity: 1; }
        61%    { opacity: 0; }
        62%    { opacity: 1; }
        63%    { opacity: 0; }
        64%    { opacity: 1; }
        65%    { opacity: 0; }
        66%    { opacity: 1; }
        67%    { opacity: 0; }
        68%    { opacity: 1; }
        69%    { opacity: 0; }
        70%    { opacity: 1; }
