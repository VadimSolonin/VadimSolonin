  <text x="196" y="310" font-size="9" font-weight="700" fill="#bc4c00" text-anchor="middle">Grafana</text>
  <rect x="228" y="298" width="46" height="18" rx="3" fill="#fff0eb"/>
  <text x="251" y="310" font-size="9" font-weight="700" fill="#bc4c00" text-anchor="middle">Kibana</text>

  <line x1="28" y1="330" x2="772" y2="330" stroke="#d0d7de" stroke-width="1"/>

  <text x="28" y="352" font-size="10" fill="#1a7f37">$ echo $LINK</text>
  <text x="120" y="352" font-size="10" fill="#57606a">linkedin.com/in/vadimsolonin</text>
