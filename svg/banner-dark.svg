<svg viewBox="0 0 720 392" xmlns="http://www.w3.org/2000/svg" width="720" height="392" font-family="'JetBrains Mono', 'Courier New', monospace">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

      /*
        Cycle: 26s
        0s–4s    (0%–15.4%)   type line1 (48 chars)
        4s–6s    (15.4%–23.1%) cursor1 blinks 2s
        6s–11s   (23.1%–42.3%) type line2 (52 chars)
        11s–14s  (42.3%–53.8%) cursor2 blinks 3s
        14s–19s  (53.8%–73.1%) erase line2
        19s–23s  (73.1%–88.5%) erase line1
        23s–26s  (88.5%–100%)  blank pause
      */

      .typing-line1 { animation: typing1 20s steps(48, end) infinite; }
      @keyframes typing1 {
        0%          { clip-path: inset(0 100% 0 0); }
        15.4%, 73.1% { clip-path: inset(0 0% 0 0); }
        88.5%, 100% { clip-path: inset(0 100% 0 0); }
      }

      .typing-line2 { animation: typing2 20s steps(52, end) infinite; }
      @keyframes typing2 {
        0%, 23.1%   { clip-path: inset(0 100% 0 0); }
        42.3%, 53.8% { clip-path: inset(0 0% 0 0); }
        73.1%, 100% { clip-path: inset(0 100% 0 0); }
      }

      .cursor-line1 { animation: cur1 20s steps(1, end) infinite; }
      @keyframes cur1 {
        0%,   15.3%  { opacity: 0; }
        15.4%        { opacity: 1; }
        17.7%        { opacity: 0; }
        20.0%        { opacity: 1; }
        22.3%        { opacity: 0; }
        23.1%, 100%  { opacity: 0; }
      }

      .cursor-line2 { animation: cur2 20s steps(1, end) infinite; }
      @keyframes cur2 {
        0%,   42.2%  { opacity: 0; }
        42.3%        { opacity: 1; }
        44.6%        { opacity: 0; }
        46.9%        { opacity: 1; }
        49.2%        { opacity: 0; }
        51.5%        { opacity: 1; }
        53.7%        { opacity: 0; }
        53.8%, 100%  { opacity: 0; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="392" rx="10" fill="#0d1117"/>
  <rect width="720" height="392" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="6" fill="#28ca41"/>

  <!-- Title -->
  <text x="20" y="54" font-size="13" fill="#8b949e">Pizza-powered QA Engineer @ Dodo Brands</text>

  <!-- About block -->
  <text x="20" y="78" font-size="11" fill="#3fb950">$ cat about.md</text>
  <g>
    <text class="typing-line1" x="20" y="102" font-size="11" fill="#8b949e">Building bulletproof test automation since 2020.</text>
    <text class="typing-line2" x="20" y="124" font-size="11" fill="#8b949e">I break things professionally so users don't have to.</text>
    <text class="cursor-line1" font-size="11" fill="#3fb950" x="336" y="102">&#x2588;</text>
    <text class="cursor-line2" font-size="11" fill="#3fb950" x="369" y="124">&#x2588;</text>
  </g>

  <line x1="20" y1="143" x2="700" y2="143" stroke="#30363d" stroke-width="1"/>
  <text x="20" y="160" font-size="11" fill="#3fb950">$ echo $STACK</text>

  <!-- Stack rows -->
  <text x="20" y="182" font-size="11" fill="#8b949e">languages</text>
  <rect x="250" y="167" width="44" height="22" rx="3" fill="#1c2d3f"/>
  <text x="272" y="182" font-size="11" font-weight="700" fill="#58a6ff" text-anchor="middle">Java</text>
  <rect x="300" y="167" width="76" height="22" rx="3" fill="#1a2e22"/>
  <text x="338" y="182" font-size="11" font-weight="700" fill="#3fb950" text-anchor="middle">TypeScript</text>

  <text x="20" y="212" font-size="11" fill="#8b949e">currently learning</text>
  <rect x="250" y="197" width="30" height="22" rx="3" fill="#271d3f"/>
  <text x="265" y="212" font-size="11" font-weight="700" fill="#bc8cff" text-anchor="middle">C#</text>
  <rect x="286" y="197" width="48" height="22" rx="3" fill="#271d3f"/>
  <text x="310" y="212" font-size="11" font-weight="700" fill="#bc8cff" text-anchor="middle">NUnit</text>

  <text x="20" y="242" font-size="11" fill="#8b949e">test automation</text>
  <rect x="250" y="227" width="72" height="22" rx="3" fill="#1a2e22"/>
  <text x="286" y="242" font-size="11" font-weight="700" fill="#3fb950" text-anchor="middle">Playwright</text>
  <rect x="328" y="227" width="88" height="22" rx="3" fill="#1c2d3f"/>
  <text x="372" y="242" font-size="11" font-weight="700" fill="#58a6ff" text-anchor="middle">Rest-Assured</text>
  <rect x="422" y="227" width="46" height="22" rx="3" fill="#1c2d3f"/>
  <text x="445" y="242" font-size="11" font-weight="700" fill="#58a6ff" text-anchor="middle">JUnit</text>

  <text x="20" y="272" font-size="11" fill="#8b949e">ci/cd</text>
  <rect x="250" y="257" width="58" height="22" rx="3" fill="#2d2a1a"/>
  <text x="279" y="272" font-size="11" font-weight="700" fill="#e3b341" text-anchor="middle">Jenkins</text>
  <rect x="314" y="257" width="110" height="22" rx="3" fill="#2d2a1a"/>
  <text x="369" y="272" font-size="11" font-weight="700" fill="#e3b341" text-anchor="middle">GitHub Actions</text>

  <text x="20" y="302" font-size="11" fill="#8b949e">infrastructure</text>
  <rect x="250" y="287" width="54" height="22" rx="3" fill="#112329"/>
  <text x="277" y="302" font-size="11" font-weight="700" fill="#39d3bb" text-anchor="middle">Docker</text>
  <rect x="310" y="287" width="82" height="22" rx="3" fill="#112329"/>
  <text x="351" y="302" font-size="11" font-weight="700" fill="#39d3bb" text-anchor="middle">Kubernetes</text>

  <text x="20" y="332" font-size="11" fill="#8b949e">monitoring &amp; observability</text>
  <rect x="250" y="317" width="58" height="22" rx="3" fill="#2d1f14"/>
  <text x="279" y="332" font-size="11" font-weight="700" fill="#f78166" text-anchor="middle">Grafana</text>
  <rect x="314" y="317" width="52" height="22" rx="3" fill="#2d1f14"/>
  <text x="340" y="332" font-size="11" font-weight="700" fill="#f78166" text-anchor="middle">Kibana</text>

  <line x1="20" y1="353" x2="700" y2="353" stroke="#30363d" stroke-width="1"/>
  <text x="20" y="371" font-size="11" fill="#3fb950">$ echo $LINK</text>
  <text x="138" y="371" font-size="11" fill="#8b949e">linkedin.com/in/vadimsolonin</text>
</svg>
